services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      # 1. 基础配置
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # 2. 固定集群 ID (防止重启后数据不匹配)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # 3. 监听器配置
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.168.34.141:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # 4. 核心：指定日志存储目录，必须与下面 volumes 的容器内路径一致
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # 5. 单节点生产优化
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"

    volumes:
      # 将当前目录下的 data 文件夹映射到容器
      - ./data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      broker:
        condition: service_started
    environment:
      KAFKA_CLUSTERS_0_NAME: "Dev-Cluster-141"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "broker:9092"
      DYNAMIC_CONFIG_ENABLED: 'true'
