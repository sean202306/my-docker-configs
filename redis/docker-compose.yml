version: '3.8'

services:
  # Redis 服务主体
  redis:
    image: redis:7.2-alpine
    # Swarm 模式下建议省略 container_name，由集群自动命名
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      # 改用绝对路径，确保数据位置受你掌控
      - /root/redis-data:/data
    networks:
      - redis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          # 使用变量指定节点，默认运行在主节点 docker-sean 上
          - node.hostname == ${TARGET_NODE:-docker-sean}
      restart_policy:
        condition: on-failure

  # Redis Insight 图形化管理界面
  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    networks:
      - redis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          # 界面建议也跟服务跑在同一个节点，或者设为 manager 方便访问
          - node.hostname == ${TARGET_NODE:-docker-sean}
      restart_policy:
        condition: on-failure

networks:
  redis-net:
    driver: overlay # 使用 Overlay 网络实现跨节点通信
    driver_opts:
      com.docker.network.driver.mtu: "1450"
